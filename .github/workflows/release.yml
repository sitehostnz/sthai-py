name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Must match the environment configured on the PyPI trusted publisher
    environment: pypi
    permissions:
      # Required for PyPI Trusted Publishing (OIDC)
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish
